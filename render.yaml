services:
  - type: web
    name: forex-trading-system-api
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips='*'
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        value: https://style-whisperer-87.lovable.app
      - key: API_TRUSTED_HOSTS
        sync: false
      - key: API_ROOT_PATH
        value: ""
      - key: OANDA_API_KEY
        sync: false
      - key: OANDA_ACCOUNT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
